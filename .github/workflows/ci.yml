name: CI

on:
  push:
    branches: [master, feat/*]
  pull_request:
    branches: [master]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx eslint src/ App.tsx index.js __tests__/

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx jest --coverage

  build:
    name: Build
    needs: [lint, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # buildPlugin.sh internally calls `npm run prepare:dict` which
      # fetches the WordNet StarDict from the dict.org mirror (~10MB)
      # and emits src/core/dict/data/baseDictData.ts before Metro
      # bundles. CI runners have network access; the fetch is
      # idempotent, so re-runs reuse the cached files in dict/wordnet/.
      - run: chmod +x buildPlugin.sh && ./buildPlugin.sh
      - uses: actions/upload-artifact@v4
        with:
          name: plugin-${{ github.sha }}
          path: build/outputs/SnDict.snplg
          retention-days: 30
