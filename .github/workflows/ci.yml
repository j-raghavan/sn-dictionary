name: CI

on:
  push:
    branches: [master, feat/*]
  pull_request:
    branches: [master]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx eslint src/ App.tsx index.js __tests__/

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx jest --coverage

  # buildPlugin.{sh,ps1} internally call `npm run prepare:dict` which
  # fetches the WordNet StarDict from the dict.org mirror (~10MB), verifies
  # its pinned SHA-256, and emits src/core/dict/data/baseDictData.ts before
  # Metro bundles. The Windows job is what catches PowerShell-specific
  # regressions in buildPlugin.ps1 — without it, a broken Windows build
  # surface can land silently. Two separate jobs (rather than a matrix)
  # because the `shell:` key cannot reference `matrix.*` — GitHub Actions
  # evaluates it before matrix expansion.
  build-linux:
    name: Build (ubuntu-latest)
    needs: [lint, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Build plugin
        shell: bash
        run: chmod +x buildPlugin.sh && ./buildPlugin.sh
      - uses: actions/upload-artifact@v4
        with:
          name: plugin-linux-${{ github.sha }}
          path: build/outputs/SnDict.snplg
          retention-days: 30

  build-windows:
    name: Build (windows-latest)
    needs: [lint, test]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Build plugin
        shell: pwsh
        run: powershell -ExecutionPolicy Bypass -File .\buildPlugin.ps1
      - uses: actions/upload-artifact@v4
        with:
          name: plugin-windows-${{ github.sha }}
          path: build/outputs/SnDict.snplg
          retention-days: 30
